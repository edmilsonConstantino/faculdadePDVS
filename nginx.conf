# =============================================================
# nginx.conf — PDVSYSTEM Frontend Container
# Serve os ficheiros React compilados pelo Vite.
# Reencaminha pedidos à API e WebSocket para o container backend.
# =============================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Todos os pedidos que começam com /api são enviados para
    # o container backend pela rede interna Docker (DNS: backend).
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Proxy: WebSocket → backend ────────────────────────────
    # O PDVSYSTEM usa WebSockets (biblioteca "ws") para
    # notificações em tempo real. Nginx precisa de fazer upgrade
    # da ligação HTTP para WS.
    location /ws {
        proxy_pass             http://backend:3000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }


    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # ── Compressão gzip para assets ───────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml
                    application/xml+rss text/javascript;
    gzip_min_length 1024;
}
